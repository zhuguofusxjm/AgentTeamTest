<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>Agent Team 量化分析</title>
  <link rel="stylesheet" href="/static/chat.css">
</head>
<body>
  <div class="layout">
    <main class="center">
      <div id="messages"></div>
      <form id="chat-form">
        <input id="chat-input" placeholder="例: 帮我分析 ETH 是否有买卖点" autocomplete="off">
        <button type="submit">发送</button>
      </form>
    </main>
    <div class="splitter" id="splitter"></div>
    <aside class="right" id="right-panel">
      <div class="right-tabs">
        <button class="tab-btn active" data-tab="debate">辩论流</button>
        <button class="tab-btn" data-tab="team">分析师团队</button>
      </div>
      <div id="tab-debate" class="tab-pane active">
        <div id="debate-stream"></div>
      </div>
      <div id="tab-team" class="tab-pane">
        <div id="team-list"></div>
      </div>
    </aside>
    <button id="drawer-toggle" title="最近决策">最近决策</button>
    <aside class="drawer" id="drawer">
      <h3>当前跟踪</h3>
      <ul id="tracks-list"></ul>
      <h3 style="margin-top:18px">最近决策</h3>
      <ul id="decisions-list"></ul>
    </aside>
  </div>
  <script src="/static/chat.js"></script>
</body>
</html>
