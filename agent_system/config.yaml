default_model: deepseek-chat
audit_dir: tracks/
data_db: funding_rate.db

providers:
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    models: [deepseek-chat, deepseek-reasoner]

binance:
  api_key_env: BINANCE_API_KEY
  api_secret_env: BINANCE_API_SECRET
  use_signed_for_quota: true

mates:
  trend_multi_tf:
    model: deepseek-chat
    temperature: 0.2
    max_tokens: 1500
    enabled: true
    prompt_file: prompts/trend_multi_tf.md
  funding_rate:
    model: deepseek-chat
    temperature: 0.2
    max_tokens: 1000
    enabled: true
    prompt_file: prompts/funding_rate.md
  smart_money:
    model: deepseek-chat
    enabled: true
    prompt_file: prompts/smart_money.md
  long_short_compare:
    model: deepseek-chat
    enabled: true
    prompt_file: prompts/long_short_compare.md
  volatility:
    model: deepseek-chat
    enabled: true
    prompt_file: prompts/volatility.md
  experience:
    model: deepseek-chat
    temperature: 0.3
    enabled: false
    prompt_file: prompts/experience.md
  red_team:
    model: deepseek-chat
    temperature: 0.5
    enabled: true
    prompt_file: prompts/red_team.md
  macro_sentiment:
    model: deepseek-chat
    enabled: true
    prompt_file: prompts/macro_sentiment.md
  liquidity:
    model: deepseek-chat
    enabled: true
    prompt_file: prompts/liquidity.md
  position_mgr:
    model: deepseek-chat
    temperature: 0.1
    enabled: true
    prompt_file: prompts/position_mgr.md
  decision_lead:
    model: deepseek-chat
    temperature: 0.2
    enabled: true
    prompt_file: prompts/decision_lead.md

modes:
  full:
    enabled_mates: [trend_multi_tf, funding_rate, smart_money,
                    long_short_compare, volatility, experience,
                    macro_sentiment, liquidity, position_mgr]
    rounds: 3
  lean:
    enabled_mates: [trend_multi_tf, funding_rate, smart_money,
                    long_short_compare, position_mgr, experience]
    rounds: 2
  tracking:
    enabled_mates: [trend_multi_tf, funding_rate, smart_money,
                    long_short_compare, position_mgr, experience]
    rounds: 2

scheduler:
  scan_interval_min: 240
  tracking_interval_min: 60
  retrospective_cron: "0 3 * * *"
  scan_max_candidates: 10
  scan_min_score: 30

push:
  server_chan:
    enabled: false
    key_env: SERVER_CHAN_KEY
  cooldown_min: 240

defaults:
  temperature: 0.3
  max_tokens: 2000
  timeout_sec: 30
  retry_max: 2
